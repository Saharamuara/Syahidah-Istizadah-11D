<body>

        <img src="header.png" alt="Banner Toko Ranaruta Baswara">

 <header>

    <main class="Formulir-Halaman"> <div class="container-form-putih"> <h2>Berikan Testimoni Anda</h2>
        
        <form id="formTestimoni">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="nama" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <label>Asal Sekolah/Instansi/Komunitas:</label>
                <input type="text" id="asal" placeholder="Asal Sekolah | Instansi | Komunitas" required>
            </div>

            <div class="input-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label>Judul Buku yang dibeli:</label>
                <input type="text" id="judul" placeholder="Judul Buku yang dibeli" required>
            </div>

            <div class="input-group">
                <label>Rating 1-5:</label>
                <input type="number" id="rating" placeholder="1-5" min="1" max="5" required>
            </div>

            <div class="input-group">
                <label>Testimoni Anda:</label>
                <textarea id="pesan" placeholder="Tulis pengalaman Anda..." rows="4" required></textarea>
            </div>

            <button type="submit" class="btn-kirim">Kirim Testimoni</button>
        </form>
        <main>
            <footer>
                <p>&copy; 2026 Toko Ranaruta Baswara</p>
            </footer>
    </div>
</main>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;
        const asal = document.getElementById('asal').value;
        const judul = document.getElementById('judul').value;
        const pesan = document.getElementById('pesan').value;
        const dataBaru = { nama, email, asal, judul, pesan };

        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

        testimoniList.push(dataBaru);

        localStorage.setItem('testimoniList',JSON.stringify(testimoniList));
        window.location.href = 'proses-testimoni.html';
    });

</script>
